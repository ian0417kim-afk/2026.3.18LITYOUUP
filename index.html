<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>릿츄업 에세이 수업 설명회</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1E3A5F 0%, #2E86AB 100%);
            display: flex; flex-direction: column; align-items: center;
        }
        .header { text-align: center; color: white; padding: 15px 10px; flex-shrink: 0; }
        .header h1 { font-size: 1.5em; margin-bottom: 5px; }
        .header p { font-size: 0.9em; opacity: 0.9; }
        .viewer-container {
            flex: 1; width: 100%; max-width: 500px;
            display: flex; flex-direction: column; padding: 0 10px 10px; min-height: 0;
        }
        .pdf-frame {
            flex: 1; background: white; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); overflow: hidden;
            display: flex; flex-direction: column; min-height: 0;
        }
        .controls {
            background: #f5f7fa; padding: 12px 15px;
            display: flex; justify-content: center; align-items: center; gap: 15px;
            border-bottom: 1px solid #e0e0e0; flex-shrink: 0;
        }
        .controls button {
            background: #2E86AB; color: white; border: none;
            padding: 12px 20px; border-radius: 8px; cursor: pointer;
            font-size: 16px; font-weight: bold; min-width: 70px;
            transition: background 0.3s, transform 0.1s;
        }
        .controls button:active { transform: scale(0.95); }
        .controls button:hover { background: #1E3A5F; }
        .controls button:disabled { background: #ccc; cursor: not-allowed; }
        .page-info { font-size: 18px; font-weight: bold; color: #333; min-width: 80px; text-align: center; }
        #pdf-viewer {
            flex: 1; display: flex; justify-content: center; align-items: center;
            background: #e8e8e8; overflow: hidden; min-height: 0; touch-action: pan-y;
        }
        #pdf-viewer canvas { max-width: 100%; max-height: 100%; object-fit: contain; }
        .bottom-bar { padding: 12px 10px; display: flex; gap: 10px; justify-content: center; flex-shrink: 0; }
        .download-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: #F18F01; color: white; padding: 12px 20px;
            border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: bold;
            transition: transform 0.2s;
        }
        .download-btn:active { transform: scale(0.95); }
        .loading {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: #666; font-size: 16px; text-align: center; padding: 20px;
        }
        .loading .spinner {
            width: 40px; height: 40px; border: 4px solid #e0e0e0;
            border-top-color: #2E86AB; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (min-width: 768px) {
            .header h1 { font-size: 2em; }
            .viewer-container { max-width: 600px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎓 릿츄업</h1>
        <p>에세이 수업 설명회</p>
    </div>
    <div class="viewer-container">
        <div class="pdf-frame">
            <div class="controls">
                <button id="prev-btn" onclick="prevPage()">◀</button>
                <span class="page-info"><span id="page-num">1</span> / <span id="page-count">-</span></span>
                <button id="next-btn" onclick="nextPage()">▶</button>
            </div>
            <div id="pdf-viewer">
                <div class="loading"><div class="spinner"></div>불러오는 중...</div>
            </div>
        </div>
        <div class="bottom-bar">
            <a href="essay_vertical.pptx" class="download-btn" download>📥 PPT 다운로드</a>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let pdfDoc = null, pageNum = 1, pageRendering = false, pageNumPending = null;
        let touchStartX = 0;
        
        function getScale() {
            const v = document.getElementById('pdf-viewer');
            return Math.min(v.clientWidth / 405, v.clientHeight / 720) * 0.95;
        }
        
        function renderPage(num) {
            pageRendering = true;
            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({scale: getScale()});
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                page.render({canvasContext: canvas.getContext('2d'), viewport}).promise.then(() => {
                    pageRendering = false;
                    const viewer = document.getElementById('pdf-viewer');
                    viewer.innerHTML = '';
                    viewer.appendChild(canvas);
                    if (pageNumPending !== null) { renderPage(pageNumPending); pageNumPending = null; }
                });
            });
            document.getElementById('page-num').textContent = num;
        }
        
        function queueRenderPage(num) { pageRendering ? pageNumPending = num : renderPage(num); }
        function prevPage() { if (pageNum > 1) { pageNum--; queueRenderPage(pageNum); updateButtons(); } }
        function nextPage() { if (pageNum < pdfDoc.numPages) { pageNum++; queueRenderPage(pageNum); updateButtons(); } }
        function updateButtons() {
            document.getElementById('prev-btn').disabled = pageNum <= 1;
            document.getElementById('next-btn').disabled = pageNum >= pdfDoc.numPages;
        }
        
        // Touch swipe
        const viewer = document.getElementById('pdf-viewer');
        viewer.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX, {passive: true});
        viewer.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 50) diff > 0 ? nextPage() : prevPage();
        }, {passive: true});
        
        // Keyboard
        document.addEventListener('keydown', e => { if (e.key === 'ArrowLeft') prevPage(); if (e.key === 'ArrowRight') nextPage(); });
        window.addEventListener('resize', () => pdfDoc && queueRenderPage(pageNum));
        
        // Load PDF
        pdfjsLib.getDocument('essay_vertical.pdf').promise.then(pdf => {
            pdfDoc = pdf;
            document.getElementById('page-count').textContent = pdf.numPages;
            renderPage(pageNum); updateButtons();
        }).catch(() => {
            document.getElementById('pdf-viewer').innerHTML = '<div class="loading">⚠️ PDF를 불러올 수 없습니다.<br><br>아래 버튼으로 PPT를 다운로드해 주세요.</div>';
        });
    </script>
</body>
</html>
